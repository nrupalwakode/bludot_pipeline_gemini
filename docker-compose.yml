services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/backend/bludot_pipeline.db
      - GROQ_API_KEY=${GROQ_API_KEY}
    init: true  # This handles the cleanup signals correctly
    # TEMPORARILY comment out the 'user' line to ensure permissions align
    # user: "${UID:-1000}:${GID:-1000}" 
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    init: true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
